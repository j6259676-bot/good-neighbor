<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的 Watch Party 名單 ｜ Good Neighbor ｜ The Hope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>@import url("https://fontsapi.zeoseven.com/745/main/result.css");</style>
<style>
  :root{
    --ink:#191817; --ink-soft:#46443f; --muted:#5f5e58;
    --gold:#F4B400; --gold-deep:#8a6500; --gold-tint:rgba(244,180,0,.16);
    --y:#F4B400; --y2:#e0a400;
    --gray:#CDC9BD; --gray-deep:#A9ADA9;
    --paper:#FFFFFF; --cream:#F4F1E8; --line:#e6e3da;
    --silver1:#F4F1E8; --silver2:#CDC9BD;
    --go:#1D9E75; --no:#C7402F;
    --en:"Noto Sans",-apple-system,BlinkMacSystemFont,sans-serif;
    --display:"Mantou Sans","Noto Sans TC",sans-serif;
    --sans:"Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);background:var(--silver1);line-height:1.7;-webkit-font-smoothing:antialiased}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px}
  .icon{width:20px;height:20px;stroke-width:2;flex:none}

  .nav{position:sticky;top:0;z-index:50;background:rgba(244,241,232,.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:58px;border-bottom:1px solid var(--line)}
  .nav .brand{font-family:var(--display);font-size:20px;color:var(--ink)}
  .nav .brand i{color:inherit;font-style:normal}
  .nav .tag{font-size:12px;font-weight:700;color:var(--muted)}

  .hero{background:var(--gold);color:var(--ink);padding:24px 0}
  .hero .kick{font-family:var(--display);font-size:12px;letter-spacing:.12em;color:var(--gold-deep)}
  .hero h1{font-size:25px;font-weight:900;margin-top:4px;line-height:1.2}
  .hero .area{font-size:13.5px;color:var(--ink-soft);margin-top:4px;display:flex;align-items:center;gap:6px}

  .sec{padding:18px 0}

  .count{display:flex;align-items:center;gap:16px;background:var(--paper);border-radius:18px;box-shadow:0 14px 32px rgba(60,55,45,.10);padding:18px 20px}
  .count .big{font-size:32px;font-weight:900;line-height:1;font-family:var(--display);color:var(--gold-deep)}
  .count .big span{font-size:15px;color:var(--ink)}
  .count .lab{font-size:13px;color:var(--ink);font-weight:500}
  .count .lab b{font-weight:900}
  .count .edit{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--ink);background:var(--gold);border:0;border-radius:999px;padding:9px 14px;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .count .edit:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(244,180,0,.4)}
  .count .edit .icon{width:15px;height:15px}

  .actions{display:flex;gap:10px;margin-top:14px}
  .actions button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;transition:.15s}
  .actions button:hover{border-color:var(--gold);box-shadow:0 8px 18px rgba(60,55,45,.08)}
  .actions button .icon{width:16px;height:16px}

  .reminder{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--ink-soft);background:var(--gold-tint);border-radius:12px;padding:12px 14px;margin-top:14px;line-height:1.6}
  .reminder .icon{width:16px;height:16px;color:var(--gold-deep);margin-top:2px}

  .listhead{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--muted);margin:22px 0 10px;display:flex;align-items:center;gap:7px}

  .person{background:var(--paper);border-radius:16px;box-shadow:0 14px 32px rgba(60,55,45,.09);padding:16px 16px;margin-bottom:12px}
  .person .top{display:flex;align-items:flex-start;gap:11px}
  .person .ava{width:40px;height:40px;flex:none;border-radius:50%;background:var(--gold-tint);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--gold-deep)}
  .person .who{flex:1;min-width:0}
  .person .who .nm{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .person .who .ppl{font-size:11px;font-weight:700;background:var(--gold-tint);color:var(--gold-deep);border-radius:999px;padding:1px 9px}
  .person .who .msg{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .person .who .meta{font-size:11.5px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .person .contacts{margin-top:7px;display:flex;flex-direction:column;gap:4px}
  .person .contacts a{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink);text-decoration:none;font-weight:500;width:fit-content}
  .person .contacts a .icon{width:14px;height:14px;color:var(--gold-deep);stroke-width:2.4}
  .person .contacts a:active{color:var(--gold-deep)}

  .seg{display:flex;margin-top:12px;border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
  .seg button{flex:1;font-family:var(--sans);font-size:12.5px;font-weight:700;color:var(--ink);background:var(--paper);border:none;border-right:1.5px solid var(--line);padding:10px 4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.12s}
  .seg button:last-child{border-right:none}
  .seg button .icon{width:14px;height:14px}
  .seg button[data-on="待聯繫"].active{background:var(--gold)}
  .seg button[data-on="會來"].active{background:var(--go);color:#fff}
  .seg button[data-on="不會來"].active{background:var(--no);color:#fff}

  .state{padding:50px 20px;text-align:center;color:var(--muted);font-size:14px}
  .state .icon{width:30px;height:30px;color:var(--gray-deep);margin:0 auto 12px}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);padding:24px 16px 36px;line-height:1.7}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:999px;opacity:0;transition:.25s;z-index:200;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="nav">
    <span class="brand">GOOD <i>NEIGHBOR</i></span>
    <span class="tag">Host 名單</span>
  </div>

  <div id="app"></div>

  <div class="foot">
    這是你專屬的名單頁，建議加到手機書籤。<br>
    內容僅你看得到，請勿轉傳連結。<br>
    Good Neighbor ｜ The Hope
  </div>

  <div class="toast" id="toast"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZOkck7wxHumuHmgkFUKpjDfoQyL-ArZQxIPpk7fRhAkQlrR8ak6oY3UMtnqvr_hOk/exec';
  const TOKEN = new URLSearchParams(location.search).get('h') || '';
  const STATUS = ['待聯繫','會來','不會來'];
  const SICON = {'待聯繫':'clock','會來':'check','不會來':'x'};
  let DATA = null;

  const app = document.getElementById('app');

  // 安全建構：所有動態文字一律 textContent，杜絕 XSS
  function E(tag, opts, kids){
    const e=document.createElement(tag);
    if(opts) for(const k in opts){
      const v=opts[k];
      if(k==='class') e.className=v;
      else if(k==='text') e.textContent=v;
      else if(k==='style') e.style.cssText=v;
      else if(k.slice(0,2)==='on') e.addEventListener(k.slice(2), v);
      else e.setAttribute(k, v);
    }
    if(kids) kids.forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
    return e;
  }
  function icon(name, sz){ const i=E('i',{'data-lucide':name,'class':'icon'}); if(sz) i.style.cssText='width:'+sz+'px;height:'+sz+'px'; return i; }
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
  function stateMsg(ic,msg){ app.replaceChildren(E('div',{class:'state'},[icon(ic,30),E('div',{text:msg})])); lucide.createIcons(); }

  function load(){
    if(!TOKEN){ stateMsg('alert-triangle','連結無效，請用團隊給你的專屬名單連結開啟。'); return; }
    stateMsg('loader','載入名單中…');
    fetch(GAS_URL+'?roster='+encodeURIComponent(TOKEN)+'&t='+Date.now())
      .then(r=>r.json()).then(d=>{
        if(!d||d.ok===false){ stateMsg('alert-triangle','找不到這份名單，連結可能不正確或場次尚未開放。'); return; }
        DATA=d; render();
      }).catch(()=>stateMsg('wifi-off','連線出了點問題，請稍後再試一次。'));
  }

  function render(){
    const h=DATA.host, ppl=DATA.people||[];
    const spotsTxt = h.spots==='' ? '不限人數' : ('上限 '+h.spots+' 人');
    const remain = (h.spots==='') ? '' : ('・還可收 '+Math.max(0,h.spots-h.taken)+' 位');

    const hero=E('div',{class:'hero'},[E('div',{class:'wrap'},[
      E('div',{class:'kick',text:'我的 WATCH PARTY 名單'}),
      E('h1',{text:h.name||'Watch Party'}),
      E('div',{class:'area'},[icon('map-pin',15), (h.area||'')])
    ])]);

    const countCard=E('div',{class:'count'},[
      E('div',{},[E('div',{class:'big'},[String(h.taken), E('span',{text:' 人'})])]),
      E('div',{class:'lab'},[ '已報名', E('br'), E('b',{text:spotsTxt}), remain ]),
      E('div',{class:'edit',onclick:editSpots},[icon('pencil',15),'改名額'])
    ]);

    const actions=E('div',{class:'actions'},[
      E('button',{onclick:copyContacts},[icon('copy',16),'複製聯絡方式']),
      E('button',{onclick:copyTemplate},[icon('message-square',16),'群組邀請範本'])
    ]);

    const reminder=E('div',{class:'reminder'},[icon('info',16),
      E('div',{text:'名額有變動嗎？人數限制可以直接按上面「改名額」自己調整，會即時反映到地圖，也會通知我們。'})]);

    const listhead=E('div',{class:'listhead'},[icon('users',15),'報名清單（'+ppl.length+' 筆）']);

    const sec=E('div',{class:'sec'},[E('div',{class:'wrap'},[countCard,actions,reminder,listhead])]);
    const wrapInner=sec.firstChild;

    if(!ppl.length){
      wrapInner.appendChild(E('div',{class:'state',style:'padding:30px 10px'},[icon('inbox',30),
        E('div',{text:'還沒有人報名，分享出去邀請鄰居吧！'})]));
    } else {
      ppl.forEach(p=>{
        const ini=(String(p.name||'?').trim().slice(-1))||'?';
        const contacts=[];
        if(p.phone) contacts.push(E('a',{href:'tel:'+p.phone},[icon('phone',14), p.phone]));
        if(p.email) contacts.push(E('a',{href:'mailto:'+p.email},[icon('mail',14), p.email]));
        const metaParts=[];
        if(p.inviter) metaParts.push('邀請人：'+p.inviter);
        if(p.ts) metaParts.push(p.ts);

        const who=E('div',{class:'who'},[
          E('div',{class:'nm'},[ (p.name||'（未填名）'),
            E('span',{class:'ppl',text:'共 '+p.people+' 位'}) ]),
          p.message? E('div',{class:'msg',text:p.message}) : null,
          metaParts.length? E('div',{class:'meta'},[icon('clock',12), metaParts.join('・')]) : null,
          contacts.length? E('div',{class:'contacts'},contacts) : null
        ]);

        const top=E('div',{class:'top'},[ E('div',{class:'ava',text:ini}), who ]);

        const seg=E('div',{class:'seg'}, STATUS.map(s=>
          E('button',{'data-on':s,class:(p.status===s?'active':''),onclick:(ev)=>setStatus(p.joinId,s,ev.currentTarget)},
            [icon(SICON[s],14), s])
        ));

        wrapInner.appendChild(E('div',{class:'person'},[top,seg]));
      });
    }

    app.replaceChildren(hero, sec);
    lucide.createIcons();
  }

  function recomputeTaken(){ DATA.host.taken=(DATA.people||[]).reduce((s,x)=>s+(x.status==='不會來'?0:(parseInt(x.people,10)||1)),0); }
  function setStatus(jid,status,btn){
    const p=(DATA.people||[]).find(x=>String(x.joinId)===String(jid)); if(p)p.status=status;
    recomputeTaken(); render();   // 即時反映額度（不會來＝釋出）
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'setStatus',token:TOKEN,joinId:jid,status:status})})
      .then(r=>r.json()).then(d=>{ toast(d&&d.ok?('已標記「'+status+'」'):'沒存成功，請再試一次'); })
      .catch(()=>toast('連線問題，沒存成功'));
  }

  function editSpots(){
    const cur=DATA.host.spots===''?'':DATA.host.spots;
    const v=prompt('這場最多開放幾人報名？（清空＝不限人數）',cur);
    if(v===null) return;
    const n=v.trim()===''?0:parseInt(v,10);
    if(v.trim()!=='' && (isNaN(n)||n<0)){ toast('請輸入數字'); return; }
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'setSpots',token:TOKEN,spots:n})})
      .then(r=>r.json()).then(d=>{ if(d&&d.ok){ DATA.host.spots=(v.trim()===''?'':n); render(); toast('名額已更新'); } else toast('沒更新成功，請再試一次'); })
      .catch(()=>toast('連線問題，沒更新成功'));
  }

  function copyContacts(){
    const ppl=DATA.people||[];
    if(!ppl.length){ toast('還沒有人報名'); return; }
    const txt=ppl.map(p=>{ let l=p.name+'（'+p.people+' 位）'; if(p.phone)l+=' '+p.phone; if(p.email)l+=' '+p.email; return l; }).join('\n');
    copy(txt,'已複製所有人聯絡方式');
  }
  function copyTemplate(){
    const h=DATA.host;
    const txt='嗨大家，我是這場 '+h.area+' Watch Party 的 host。\n謝謝你報名加入，我們會一起參與線上 Hope 主日！\n聚會的時間和地點我會再跟大家確認，先建這個群組方便聯繫。\n期待見到你，有任何問題都可以在這裡問我。';
    copy(txt,'已複製群組邀請範本');
  }
  function copy(txt,msg){
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(()=>toast(msg)).catch(()=>fallbackCopy(txt,msg));
    else fallbackCopy(txt,msg);
  }
  function fallbackCopy(txt,msg){
    const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); toast(msg); }catch(e){ toast('複製失敗，請手動選取'); }
    document.body.removeChild(ta);
  }

  load();
</script>
</body>
</html>
